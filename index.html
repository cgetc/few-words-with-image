<html>
<head>
    <title>写真で一言</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #000;
        }

        details {
            max-width: 500px;
            margin: 10px auto;
            color: #fff;
        }

        .controls {
            display: flex;
            justify-content: center;
            margin: 20px auto;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background-color: #fff;
        }

        h1 {
            color: #000;
            text-align: center;
            margin: auto;
            padding: 20px 0;
            background-color: rgb(250, 220, 74);
        }
        ul {
            list-style-type: none;
            margin: auto;
            padding: 0;
            height: 500px;
            border-bottom: 5px solid #fff;
        }
        li {
            display: none;
            justify-content: center; /* 左右の中央寄せ */
        }

        li img {
            max-width: 500px;
            max-height: 500px;
        }

        /* 文字全体のスタイル */
        #answer {
            font-size: 24px;
            font-weight: bold;
            line-height: 1.5;
            height: 1.5em; /* 文字が重ならないように高さを確保 */
            background-color: #000;
            border-radius: 1em 0 0 0;
            padding: 1em .5em;
            color: #fff;
        }

        /* JavaScriptで分解された一文字ずつのスタイル */
        #answer span {
            display: inline-block; /* 必須：transformやanimationを効かせるため */
            opacity: 0;            /* 最初は透明 */
            /* transform: translateY(10px); 最初は少し下に下げておく */
            
            /* アニメーションの設定：0.5秒かけて変化、なめらかに停止 */
            animation: fadeInText 0.5s ease-out forwards;
            
            /* 文字自体の色（グラデーションにする場合の設定） */
            background: rgb(250, 220, 74);
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* アニメーションの動き（透明度100%・元の位置に戻る） */
        @keyframes fadeInText {
            to {
                opacity: 1;
                /* transform: translateY(0); */
            }
        }
    </style>
    <script type="module">
        const initialPrompt = `
        ユーザーはこれからあなた（AI）に「1枚の写真」を提示します。
        あなたは「誰も傷つけないが、画面の外への想像力がぶっ飛んでいて最高に面白い」プロの大喜利芸人として、その写真に対する最高にユーモアのある「写真で一言」のボケを「1つだけ」考えてください。

        以下の【回答のルール】と【厳正な選考フロー】を「絶対に」厳守してください。

        【回答のルール】
        1. 完全なリスペクト：被写体の容姿、年齢、性別、状態を揶揄したり、ネガティブに捉える表現は絶対に排除してください。
        2. 画面外へのイマジネーション（連想の飛躍）：
        写真に写っている要素（モノや人）を直接説明するボケは完全に禁止します。写っているものをトリガーにして、「これがあるということは、画面の外（あるいは直前・直後）で何が起きているか」を広大に連想し、壮大な勘違い、SF、未知の風習、異常な背景ストーリーへと想像を膨らませてください。

        【厳正な選考フロー】
        1. 脳内シミュレーション：頭の中で【10個以上】の全く異なる切り口のボケをシミュレーションしてください。
        2. スコアリング：それぞれの候補に対し、以下の5つの評価軸（各5点満点）で内部採点を行います。
        - ①【平和度】誰も傷つけず、ネガティブな要素が一切ないか（※最低4点以上で足切り）
        - ②【連想と狂気】写っているものからどれだけ飛躍した想像ができているか、置きにいっていないか（★最重要・点数を3倍にする）
        - ③【言葉のフック】単語の選び方が凡庸でなく、エッジが効いているか
        - ④【ストーリー性】画面の外の景色や、写真の前後まで一瞬で想像が膨らむか
        - ⑤【解像度】その突飛な世界観に絶妙な説得力があるか
        3. 最終選考：
        - 【計算式】：（平和度 ＋ 言葉のフック ＋ ストーリー性 ＋ 解像度） ＋ （連想と狂気 × 3）
        - この最終スコアが最も高かった「最高にキレている1つ（15〜30文字程度）」だけを厳選してください。

        【出力のルール】
        - 前置き・解説・挨拶は一切禁止：
        挨拶、確認、スコアの内訳や選定理由の解説、あるいは「」やボールド（**）などの装飾すら不要です。
        あなたはこのプロンプトと写真を受け取ったら、即座にボケの「一言（テキストのみ）」だけを出力して回答を終了してください。

        それでは、提示する写真に対する「最高の一言」をどうぞ。
        `.replace(/\s*/g, '');
        const languageModelOptions = {
            initialPrompts: [
                { role: 'system', content: initialPrompt },
            ],
            expectedInputs: [{ type: 'text', languages: ['ja'] }, { type: 'image' }],
            expectedOutputs: [{ type: 'text', languages: ['ja'] }],
        }

        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms))
        const languageModelReady = LanguageModel.create({
            ...languageModelOptions,
            monitor: (m) => {
                m.addEventListener('downloadprogress', (e) => {
                    if (e.loaded === 1) {
                        document.getElementById('answer').textContent = ''
                        document.getElementById('nextButton').disabled = false
                    } else {
                        document.getElementById('answer').textContent = `Loading ${e.loaded * 100}%`
                    }
                });
            },
        })

        window.startSession = async ($img, msec = 2000) => {
            await languageModelReady
            const session = await LanguageModel.create(languageModelOptions)
            try {
                const request = session.prompt([
                    {
                        role: 'user',
                        content: [
                            { type: 'image', value: $img }
                        ],
                    },
                ])
                const [response, _] = await Promise.all([request, sleep(msec)])
                return response
            } finally {
                session.destroy?.()
            }
        }
    </script>

        const images = []
        function addImage($img) {
            images.push($img)
        }

        async function next() {
            if (images.length === 0) return
 
            const randomIndex = Math.floor(Math.random() * images.length)
            const $img = images[randomIndex]

            update($img)

            audio.play()

            var result = await startSession($img)

            var matches = result.match(/^「(.*?)」$/)
            if (matches) {
                result = matches[1]
            }

            gradientText(result)
        }

        var $current = null
        function update($img) {
            if ($current) {
                audio.pause()
                audio.currentTime = 0
                document.getElementById('answer').innerHTML = ''
                $current.style.display = 'none'
            }

            $current = $img.parentElement
            $current.style.display = 'flex'
        }

        function gradientText(textContent) {
            const textElement = document.getElementById('answer')

            // 1文字ずつ分解して配列にする
            const characters = textContent.split('')

            characters.forEach((char, index) => {
                const span = document.createElement('span')
                
                // スペース（空白文字）の場合はそのまま、それ以外は文字を入れる
                span.textContent = char === ' ' ? '\u00A0' : char
                
                // 各文字のアニメーション開始時間をずらす（例：1文字ごとに0.08秒ずつ遅らせる）
                // これにより、左から右へ流れるようなグラデーション効果が生まれます
                span.style.animationDelay = `${index * 0.08}s`
                
                // コンテナに1文字ずつ追加
                textElement.appendChild(span)
            });
        }
 
        function handleFiles($input) {
            const ul = document.querySelector("ul");
            const files = $input.files;
            let left = files.length;
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const reader = new FileReader();

                reader.onload = function(e) {
                    const li = createImageNode(e.target.result);
                    ul.appendChild(li);
                    left--;
                    if (left === 0) {
                        $input.value = '';
                    }
                };

                reader.readAsDataURL(file);
            }
        }

        function loadRandomImages() {
            const ul = document.querySelector("ul")
            for (let i = 0; i < 10; i++) {
                const randomId = Math.floor(Math.random() * 1000)
                const url = `https://picsum.photos/id/${randomId}/500`
                const li = createImageNode(url)
                ul.appendChild(li)
            }
        }

        function createImageNode(url) {
            const li = document.createElement("li")
            const img = document.createElement("img")
            li.appendChild(img);
            img.crossOrigin = 'anonymous'
            img.onload = function() {
                addImage(img)
            }
            img.src = url
            return li
        }
    </script>

<body>
    <details>
        <summary>説明</summary>
        <p>
            読み込まれた画像を対象として、AIが写真に合った一言を生成します。<br>
            「次へ」ボタンを押すと、ランダムに選ばれた画像に対して一言が生成されます。<br>
            「ランダム画像を読み込む」ボタンでランダムな画像を10枚読み込みます。<br>
            「ファイルを選択」ボタンで端末内の画像を複数選択して読み込むこともできます。
        </p>
    </details>
    <div class="controls">
        <div>
            <input type="button" value="ランダム画像を読み込む" onclick="loadRandomImages()">
            <input type="file" accept="image/*" multiple onchange="handleFiles(this)">
        </div>
        <div>
            <button id="nextButton" onclick="next()" disabled>次へ</button>
        </div>
    </div>
    <div class="container">
        <h1>写真で一言</h1>
        <ul>
        </ul>
        <div id="answer"></div>
    </div>
</body>
